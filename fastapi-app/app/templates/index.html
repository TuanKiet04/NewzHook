<!--index.html-->
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewzHook - News Personalized Era</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'IBM Plex Mono', monospace;
            line-height: 1.6;
            font-size: 16px;
            font-weight: 400;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 2rem;
            line-height: 1;
        }

        .badge {
            display: inline-block;
            border: 2px solid #fff;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .hero-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .hero-subtitle {
            font-size: 1rem;
            font-weight: 400;
            color: #ccc;
            max-width: 600px;
            margin: 0 auto 3rem;
            line-height: 1.8;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .button {
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'IBM Plex Mono', monospace;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
            cursor: pointer;
            border: none;
        }

        .button-outline {
            border: 2px solid #fff;
            background: transparent;
            color: #fff;
        }

        .button-outline:hover {
            background: #fff;
            color: #000;
        }

        .button-solid {
            background: #fff;
            color: #000;
            border: 2px solid #fff;
        }

        .button-solid:hover {
            background: transparent;
            color: #fff;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2.5rem;
            }

            .hero-title {
                font-size: 1.75rem;
            }

            .hero-subtitle {
                font-size: 0.9rem;
            }

            .button-group {
                flex-direction: column;
                max-width: 300px;
            }

            .button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="badge">AI Powered News</div>
        <h1 class="logo">NewZHook</h1>
        <h2 class="hero-title">Next Gen News Intelligence</h2>
        <p class="hero-subtitle">Read Smarter. Stay Informed. Powered by Vector Search and AI.</p>

        <div class="button-group">
            <a href="/login" class="button button-outline">Login</a>
            <a href="/register" class="button button-solid">Not have an account?</a>
        </div>
    </div>
</body>

</html>
